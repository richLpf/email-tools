<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Curated email marketing, verification, and productivity tools." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>MailTools</title>
  </head>
  <body class="min-h-screen bg-white font-sans text-slate-900 antialiased">
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[100] focus:rounded-md focus:bg-blue-600 focus:px-3 focus:py-2 focus:text-white"
      >Skip to content</a
    >

    <header class="border-b border-slate-100 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a href="/" class="flex items-center gap-2.5" aria-label="MailTools home">
          <img src="/logo.svg" alt="MailTools" class="h-9 w-auto" />
        </a>
        <nav class="flex items-center gap-6 text-sm font-medium text-slate-700" aria-label="Main">
          <a id="nav-tools" href="/" class="font-semibold text-blue-600">Tools</a>
          <a id="nav-request" href="/request.html" class="transition hover:text-blue-600">Request Tool</a>
          <button
            type="button"
            id="nav-lang-toggle"
            class="flex items-center gap-1.5 rounded-lg px-2 py-1 text-slate-600 transition hover:bg-slate-50 hover:text-blue-600"
          >
            <span aria-hidden="true">🌐</span> 中文
          </button>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="mx-auto max-w-7xl px-4 pb-16 pt-12 sm:px-6 lg:px-8 lg:pt-16">
        <h1 id="hero-title" class="text-center text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl lg:text-5xl">
          Master Your Email Workflow
        </h1>
        <p id="hero-subtitle" class="mx-auto mt-4 max-w-2xl text-center text-base text-slate-600 sm:text-lg">
          A curated collection of the best email marketing, verification, and productivity tools.
        </p>

        <div class="mx-auto mt-10 max-w-5xl rounded-2xl border border-slate-100 bg-white p-4 shadow-md sm:p-6">
          <div class="relative min-w-0">
            <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
            </span>
            <label for="search-input" class="sr-only">Search tools</label>
            <input
              id="search-input"
              type="search"
              autocomplete="off"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 py-3 pl-11 pr-4 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20"
              placeholder="Search tools..."
            />
          </div>
        </div>

        <div
          class="mx-auto mt-8 flex max-w-7xl flex-col gap-8 lg:mt-10 lg:flex-row lg:items-start lg:gap-10"
        >
          <aside
            class="w-full shrink-0 lg:sticky lg:top-24 lg:w-56 lg:self-start xl:w-64"
            aria-labelledby="categories-heading"
          >
            <h2
              id="categories-heading"
              class="text-sm font-semibold uppercase tracking-wide text-slate-500"
            >
              Categories
            </h2>
            <nav
              id="category-filters"
              class="mt-3 flex flex-col gap-1"
              role="group"
              aria-label="Categories"
            ></nav>
          </aside>
          <div class="min-w-0 flex-1">
            <div
              id="tools-grid"
              class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3"
            ></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="border-t border-slate-100 py-8 text-center text-sm text-slate-500">
      <p>&copy; <span id="year"></span> MailTools. <span data-i18n-footer>All tools are third-party; links open in a new tab.</span></p>
    </footer>

    <!-- Drawer -->
    <div
      id="drawer-backdrop"
      class="fixed inset-0 z-40 hidden bg-slate-900/40 backdrop-blur-[2px] transition-opacity"
      aria-hidden="true"
    ></div>
    <aside
      id="drawer-panel"
      class="fixed inset-y-0 right-0 z-50 flex w-full max-w-md translate-x-full flex-col border-l border-slate-200 bg-white shadow-2xl transition-transform duration-300 ease-out"
      role="dialog"
      aria-modal="true"
      aria-labelledby="drawer-heading"
    >
      <div class="flex items-center justify-end border-b border-slate-100 px-5 py-4">
        <button
          type="button"
          id="drawer-close"
          class="ml-auto rounded-lg px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-100"
        >
          Close
        </button>
      </div>
      <div id="drawer-content" class="flex-1 overflow-y-auto px-5 py-6"></div>
    </aside>

    <script type="module" src="/src/main.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
